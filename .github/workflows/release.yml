name: Build & Release JellyFusion

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*.*'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'src/JellyFusion/JellyFusion.csproj'

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Normalize version
        run: |
          RAW_VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$RAW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Unsupported tag version: ${GITHUB_REF_NAME}"
            exit 1
          fi
          if [[ "$RAW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            ASSEMBLY_VERSION="${RAW_VERSION}.0"
          else
            ASSEMBLY_VERSION="$RAW_VERSION"
          fi
          echo "RELEASE_VERSION=${RAW_VERSION}" >> "$GITHUB_ENV"
          echo "ASSEMBLY_VERSION=${ASSEMBLY_VERSION}" >> "$GITHUB_ENV"

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: |
          dotnet build ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            -p:Version=${{ env.RELEASE_VERSION }} \
            -p:AssemblyVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:FileVersion=${{ env.ASSEMBLY_VERSION }}

      - name: Publish
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            --output ./publish \
            -p:Version=${{ env.RELEASE_VERSION }} \
            -p:AssemblyVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:FileVersion=${{ env.ASSEMBLY_VERSION }}

      - name: Generate meta.json
        run: |
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > publish/meta.json <<EOF
          {
              "category": "General",
              "changelog": "Release ${{ env.RELEASE_VERSION }}",
              "description": "All-in-one Jellyfin plugin: Netflix-style slider, quality badges (LAT/SUB/NUEVO/KID), studios, themes and notifications.",
              "guid": "b7c8d9e0-f1a2-3b4c-5d6e-7f8090a1b2c3",
              "imagePath": "",
              "name": "JellyFusion",
              "overview": "Combines Editor's Choice and JellyTag into a single unified plugin with multi-language support.",
              "owner": "KOOL4",
              "targetAbi": "10.10.0.0",
              "timestamp": "${TIMESTAMP}",
              "version": "${{ env.ASSEMBLY_VERSION }}"
          }
          EOF
          echo "--- publish contents ---"
          ls -la publish/

      - name: Package ZIP
        run: |
          cd publish
          zip "../JellyFusion-v${{ env.RELEASE_VERSION }}.zip" JellyFusion.dll meta.json
          cd ..
          echo "PLUGIN_ZIP=JellyFusion-v${{ env.RELEASE_VERSION }}.zip" >> "$GITHUB_ENV"
          unzip -l "JellyFusion-v${{ env.RELEASE_VERSION }}.zip"

      - name: Compute MD5 checksum
        run: |
          MD5=$(md5sum "${{ env.PLUGIN_ZIP }}" | awk '{print $1}')
          echo "PLUGIN_MD5=${MD5}" >> "$GITHUB_ENV"

      - name: Update manifest.json
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = 'manifest.json';
          const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));
          const releaseVersion = process.env.RELEASE_VERSION;
          const assemblyVersion = process.env.ASSEMBLY_VERSION;
          const newEntry = {
            version: assemblyVersion,
            changelog: `Release ${releaseVersion}`,
            targetAbi: '10.10.0.0',
            sourceUrl: `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/download/v${releaseVersion}/JellyFusion-v${releaseVersion}.zip`,
            checksum: process.env.PLUGIN_MD5,
            timestamp: new Date().toISOString()
          };
          manifest[0].versions = [
            newEntry,
            ...manifest[0].versions.filter(v => v.version !== assemblyVersion)
          ];
          fs.writeFileSync(path, JSON.stringify(manifest, null, 2) + '\n');
          console.log('manifest.json updated with version', assemblyVersion);
          EOF

      - name: Commit updated manifest
        uses: EndBug/add-and-commit@v9
        with:
          add: 'manifest.json'
          message: 'chore: update manifest for ${{ github.ref_name }}'
          default_author: github_actions

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_ZIP }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
